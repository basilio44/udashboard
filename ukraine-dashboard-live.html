function detectCategory(title, description) {
  const text = `${title} ${description}`.toLowerCase();
  let bestCat = "military";
  let bestScore = 0;
  for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
    const score = keywords.filter(kw => text.includes(kw.toLowerCase())).length;
    if (score > bestScore) { bestScore = score; bestCat = cat; }
  }
  return bestCat;
}

function detectSource(feedSource, link) {
  if (feedSource !== "mixed") return feedSource;
  const url = (link || "").toLowerCase();
  if (url.includes("bbc") || url.includes("dw.com") || url.includes("reuters") || url.includes("rferl") || url.includes("guardian")) return "eu";
  if (url.includes("nytimes") || url.includes("cnn") || url.includes("washingtonpost") || url.includes("apnews") || url.includes("aljazeera")) return "us";
  if (url.includes("tass") || url.includes("rt.com") || url.includes("rbc.ru") || url.includes("ria.ru")) return "ru";
  if (url.includes("ukrinform") || url.includes("pravda.com.ua") || url.includes("unian") || url.includes("ukr")) return "ua";
  return "eu";
}

function detectImpact(title, desc) {
  const text = `${title} ${desc}`.toLowerCase();
  const highWords = ["massive", "record", "historic", "unprecedented", "killed", "dead", "destroy", "offensive", "ceasefire", "peace deal", "breakthrough", "\u0440\u0435\u043a\u043e\u0440\u0434", "crisis"];
  const lowWords = ["tourist", "hotel", "restaurant", "museum", "apartment price", "rent"];
  if (highWords.some(w => text.includes(w))) return "high";
  if (lowWords.some(w => text.includes(w))) return "low";
  return "medium";
}

// ====== RSS PARSER ======
function parseRSSXml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "text/xml");
  const items = [];
  // Try RSS 2.0
  doc.querySelectorAll("item").forEach(item => {
    const title = item.querySelector("title")?.textContent?.trim() || "";
    const link = item.querySelector("link")?.textContent?.trim() || "";
    const desc = item.querySelector("description")?.textContent?.trim() || "";
    const pubDate = item.querySelector("pubDate")?.textContent?.trim() || "";
    if (title) items.push({ title, link, description: desc.replace(/<[^>]*>/g, "").slice(0, 300), pubDate });
  });
  // Try Atom
  if (items.length === 0) {
    doc.querySelectorAll("entry").forEach(entry => {
      const title = entry.querySelector("title")?.textContent?.trim() || "";
      const link = entry.querySelector("link")?.getAttribute("href") || "";
      const desc = (entry.querySelector("summary") || entry.querySelector("content"))?.textContent?.trim() || "";
      const pubDate = entry.querySelector("published")?.textContent?.trim() || entry.querySelector("updated")?.textContent?.trim() || "";
      if (title) items.push({ title, link, description: desc.replace(/<[^>]*>/g, "").slice(0, 300), pubDate });
    });
  }
  return items;
}

async function fetchWithProxy(url, proxyIndex = 0) {
  if (proxyIndex >= CORS_PROXIES.length) throw new Error("All proxies failed");
  try {
    const proxyUrl = CORS_PROXIES[proxyIndex](url);
    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.text();
  } catch {
    return fetchWithProxy(url, proxyIndex + 1);
  }
}

async function fetchGoogleNews(query, category) {
  const url = `https://news.google.com/rss/search?q=${query}+when:7d&hl=en-US&gl=US&ceid=US:en`;
  try {
    const xml = await fetchWithProxy(url);
    const items = parseRSSXml(xml);
    return items.map(item => ({
      ...item,
      feedSource: "mixed",
      feedSourceLabel: "Google News",
      feedCategory: category,
    }));
  } catch {
    return [];
  }
}

async function fetchRSSFeed(feed) {
  try {
    const xml = await fetchWithProxy(feed.url);
    const items = parseRSSXml(xml);
    return items.map(item => ({
      ...item,
      feedSource: feed.source,
      feedSourceLabel: feed.sourceLabel,
      feedCategory: null,
    }));
  } catch {
    return [];
  }
}

function App() {
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [activeCategory, setActiveCategory] = useState("all");
  const [activeSource, setActiveSource] = useState("all");
  const [expandedNews, setExpandedNews] = useState(new Set());
  const [searchQuery, setSearchQuery] = useState("");
  const [activeTab, setActiveTab] = useState("news");
  const [feedStatus, setFeedStatus] = useState({ loaded: 0, total: 0, errors: 0 });
  const refreshInterval = useRef(null);

  const fetchAllNews = useCallback(async () => {
    setLoading(true);
    setFeedStatus({ loaded: 0, total: RSS_FEEDS.length + GOOGLE_NEWS_FEEDS.length, errors: 0 });

    const allItems = [];
    let loaded = 0;
    let errors = 0;

    // Fetch Google News (categorized)
    const gnPromises = GOOGLE_NEWS_FEEDS.map(async (feed) => {
      try {
        const items = await fetchGoogleNews(feed.query, feed.category);
        loaded++;
        setFeedStatus(prev => ({ ...prev, loaded }));
        return items;
      } catch {
        errors++;
        loaded++;
        setFeedStatus(prev => ({ ...prev, loaded, errors }));
        return [];
      }
    });

    // Fetch RSS feeds
    const rssPromises = RSS_FEEDS.map(async (feed) => {
      try {
        const items = await fetchRSSFeed(feed);
        loaded++;
        setFeedStatus(prev => ({ ...prev, loaded }));
        return items;
      } catch {
        errors++;
        loaded++;
        setFeedStatus(prev => ({ ...prev, loaded, errors }));
        return [];
      }
    });

    const results = await Promise.allSettled([...gnPromises, ...rssPromises]);

    results.forEach(r => {
      if (r.status === "fulfilled") allItems.push(...r.value);
    });

    // Filter Ukraine-related + last 7 days
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    const ukraineKeywords = ["ukrain", "\u0443\u043a\u0440\u0430\u0438\u043d", "kyiv", "kiev", "zelensky", "\u0437\u0435\u043b\u0435\u043d\u0441\u043a", "donbas", "crimea", "\u043a\u0440\u044b\u043c", "kharkiv", "odesa", "odessa", "lviv", "\u043b\u044c\u0432\u043e\u0432", "zaporizhzhia", "kherson", "donetsk", "luhansk", "mariupol"];

    const processedItems = allItems
      .filter(item => {
        const text = `${item.title} ${item.description}`.toLowerCase();
        const isUkraineRelated = item.feedCategory || ukraineKeywords.some(kw => text.includes(kw));
        if (!isUkraineRelated) return false;

        if (item.pubDate) {
          const d = new Date(item.pubDate);
          if (!isNaN(d.getTime()) && d < sevenDaysAgo) return false;
        }
        return true;
      })
      .map((item, idx) => {
        const category = item.feedCategory || detectCategory(item.title, item.description);
        const source = detectSource(item.feedSource, item.link);
        const impact = detectImpact(item.title, item.description);
        const date = item.pubDate ? new Date(item.pubDate) : new Date();
        const dateStr = !isNaN(date.getTime())
          ? date.toLocaleDateString("ru-RU", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })
          : "\u0421\u0435\u0433\u043e\u0434\u043d\u044f";

        return {
          id: `${source}-${idx}-${Date.now()}`,
          title: item.title,
          description: item.description || "\u041f\u043e\u0434\u0440\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u043f\u043e \u0441\u0441\u044b\u043b\u043a\u0435 \u043d\u0430 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a.",

          category,
          source,
          sourceLabel: item.feedSourceLabel || "\u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a",
          date: dateStr,
          rawDate: date,
          impact,
        };
      })
      .sort((a, b) => b.rawDate - a.rawDate);

    // Deduplicate by similar titles
    const seen = new Set();
    const unique = processedItems.filter(item => {
      const key = item.title.toLowerCase().replace(/[^a-z\u0430-\u044f0-9]/g, "").slice(0, 60);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;

    setNews(unique);
    setLastUpdated(new Date());
    setLoading(false);
  }, []);

      const searchMatch = !searchQuery || item.title.toLowerCase().includes(searchQuery.toLowerCase()) || item.description.toLowerCase().includes(searchQuery.toLowerCase());
      return catMatch && srcMatch && searchMatch;

    counts.all = news.length;
    return counts;

    news.forEach(n => { counts[n.source] = (counts[n.source] || 0) + 1; });

              <p className="text-xs text-gray-500">
                \u041f\u043e\u043a\u0430\u0437\u0430\u043d\u043e <span className="font-semibold text-gray-700">{filteredNews.length}</span> \u043d\u043e\u0432\u043e\u0441\u0442\u0435\u0439 (\u0442\u043e\u043b\u044c\u043a\u043e \u0437\u0430 \u043f\u043e\u0441\u043b\u0435\u0434\u043d\u0438\u0435 7 \u0434\u043d\u0435\u0439)
              </p>
            </div>

            <div className="space-y-2">
              {!loading && filteredNews.length === 0 ? (
                <div className="text-center py-12 text-gray-400">
                  <p className="text-3xl mb-3">\u26a0\ufe0f</p>
                  <p className="text-sm font-medium">\u041d\u0435\u0442 \u043d\u043e\u0432\u043e\u0441\u0442\u0435\u0439 \u043f\u043e \u0432\u044b\u0431\u0440\u0430\u043d\u043d\u044b\u043c \u0444\u0438\u043b\u044c\u0442\u0440\u0430\u043c</p>
                  <p className="text-xs mt-1">\u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u0438\u0437\u043c\u0435\u043d\u0438\u0442\u044c \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044e \u0438\u043b\u0438 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a</p>
                </div>
              ) : (
                filteredNews.map(item => (
                  <NewsCard key={item.id} item={item} expanded={expandedNews.has(item.id)} onToggle={() => toggleExpand(item.id)} />
                ))
              )}
            </div>
          </>
        )}

        <div className="mt-6 mb-4 text-center">
          <p className="text-xs text-gray-400">
            \u0414\u0430\u043d\u043d\u044b\u0435 \u0441\u043e\u0431\u0438\u0440\u0430\u044e\u0442\u0441\u044f \u0438\u0437 \u0443\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u0438\u0445, \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445, \u0435\u0432\u0440\u043e\u043f\u0435\u0439\u0441\u043a\u0438\u0445 \u0438 \u0430\u043c\u0435\u0440\u0438\u043a\u0430\u043d\u0441\u043a\u0438\u0445 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u043e\u0432. \u0410\u0432\u0442\u043e\u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435 \u043a\u0430\u0436\u0434\u044b\u0435 30 \u043c\u0438\u043d\u0443\u0442.
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
